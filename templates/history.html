<!DOCTYPE html>
<html>

<head>

<title>History</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Prediction History</h2>

<table class="table table-striped">

<tr>

<th>ID</th>
<th>Date</th>
<th>Age</th>
<th>BMI</th>
<th>Risk</th>
<th>Probability</th>

</tr>

{% for row in rows %}

<tr>

<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[7] }}</td>
<td>{{ row[11] }}</td>
<td>{{ row[10] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
